[#if configuration.type == "action"]
	<button [#if configuration.animationDelay]style="animation-delay: 1s;"[/#if] data-animation="${configuration.animationType}" class="animated-button btn btn-${configuration.buttonSize} btn-${configuration.buttonType}" data-lfr-editable-id="action" data-lfr-editable-type="action">
		Go Somewhere
	</button>
[#else]
	<div [#if configuration.animationDelay]style="animation-delay: 1s;"[/#if] data-animation="${configuration.animationType}" class="animated-button component-button text-break">
		<a class="btn btn-${configuration.buttonSize} btn-${configuration.buttonType}" data-lfr-editable-id="link" data-lfr-editable-type="link" href="" id="fragment-${fragmentEntryLinkNamespace}-link">
			Go Somewhere
		</a>
	</div>
[/#if]
